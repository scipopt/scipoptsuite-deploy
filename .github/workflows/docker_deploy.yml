name: Build And Push Docker Image

on:
  workflow_run:
    workflows: ["Build Binaries"]
    types: [completed]
    branches: ["release-*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'The version of SCIPOptSuite like #.#.#'
        required: true
        type: number

env:
  IMAGE_NAME: scipoptsuite
  REPOSITORY_NAME: scipoptsuite

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
    - uses: actions/checkout@v4

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
        else
          # Extract version from branch name (release-X.Y.Z -> X.Y.Z)
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "value=${BRANCH#release-}" >> "$GITHUB_OUTPUT"
        fi

    - name: Verify upstream .deb packages exist
      run: |
        VERSION="${{ steps.version.outputs.value }}"
        TAG_NO_DOTS=$(echo "v${VERSION}" | tr -d '.')
        BASE="https://github.com/scipopt/scip/releases/download/${TAG_NO_DOTS}"
        for suffix in "Linux-debian.deb" "Linux-arm64.deb"; do
          URL="${BASE}/SCIPOptSuite-${VERSION}-${suffix}"
          echo "Checking ${URL}..."
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "Error: upstream package not found (HTTP ${STATUS}): ${URL}"
            echo "The upstream SCIP release may not have been published yet."
            exit 1
          fi
        done
        echo "Both packages found."

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set Docker Tags
      id: metadata
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REPOSITORY_NAME }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=raw,value=${{ steps.version.outputs.value }}

    - name: Build and push
      uses: docker/build-push-action@v3
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.metadata.outputs.tags }}
        build-args: TAG=${{ steps.version.outputs.value }}